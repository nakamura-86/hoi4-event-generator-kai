<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>HOI4 News Generator</title>
    <style>
        :root { --gold: #d4af37; --bg: #000; --panel: #1e1e1e; }
        body { background: var(--bg); color: #eee; font-family: "Hiragino Mincho ProN", serif; display: flex; padding: 20px; gap: 30px; justify-content: center; margin: 0; }
        .sidebar { width: 360px; background: var(--panel); padding: 25px; border-radius: 12px; border: 1px solid #333; height: fit-content; box-shadow: 0 10px 30px #000; }
        h1 { color: var(--gold); font-size: 22px; text-align: center; margin: 0 0 20px; letter-spacing: 2px; }
        .group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: bold; color: var(--gold); }
        input[type="text"], textarea, input[type="file"] { width: 100%; background: #111; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        textarea { height: 160px; resize: none; line-height: 1.5; }
        .slider-box { display: flex; align-items: center; gap: 15px; margin-top: 10px; font-size: 13px; }
        input[type="range"] { flex: 1; accent-color: var(--gold); }
        button#saveBtn { width: 100%; padding: 18px; background: #45a049; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button#saveBtn:hover { background: #52be57; transform: translateY(-2px); }
        .viewport { background: #000; padding: 10px; border-radius: 8px; position: sticky; top: 20px; }
        canvas { display: block; max-height: 90vh; max-width: 100%; cursor: move; }
        .hint { font-size: 11px; color: #777; text-align: center; margin-top: 15px; font-style: italic; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>HOI4 EVENT GEN</h1>
        <div class="group">
            <label>1. イベント写真を選択</label>
            <input type="file" id="photoIn" accept="image/*">
            <div class="slider-box"><span>ズーム</span><input type="range" id="zoom" min="0.1" max="4" step="0.01" value="0.85"></div>
        </div>
        <div class="group">
            <label>2. タイトル</label>
            <input type="text" id="ttl" placeholder="ラインラント進駐">
        </div>
        <div class="group">
            <label>3. 本文</label>
            <textarea id="txt" placeholder="説明文を入力..."></textarea>
        </div>
        <div class="group">
            <label>4. オプションラベル</label>
            <input type="text" id="btn" placeholder="ここはドイツの領土だ">
        </div>
        <button id="saveBtn">PNG形式でエクスポート</button>
        <p class="hint">プレビュー画面で写真をドラッグして移動してください。</p>
    </div>

    <div class="viewport">
        <canvas id="cv"></canvas>
    </div>

<script>
    const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
    const bg = new Image(), photo = new Image();
    
    let pos = {x: 480, y: 280}, drag = false, start = {x: 0, y: 0};

    // --- 背景画像(template.png)を同じリポジトリから読み込む ---
    // これにより外部URLに頼らず100%表示されます
    bg.src = "template.png"; 

    bg.onload = () => {
        cv.width = bg.width; // 961
        cv.height = bg.height; // 1102
        render();
    };

    document.getElementById('photoIn').onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (f) => {
            photo.src = f.target.result;
            photo.onload = render;
        };
        reader.readAsDataURL(file);
    };

    function render() {
        if (!bg.complete) return;
        
        ctx.clearRect(0, 0, cv.width, cv.height);
        const scale = parseFloat(document.getElementById('zoom').value);

        // --- STEP 1: はみ出し防止（クリッピング） ---
        // 新聞のキャンバスサイズ内のみを描画対象にする
        ctx.save();
        ctx.beginPath();
        ctx.rect(0, 0, cv.width, cv.height);
        ctx.clip();
        
        // 写真を背景よりも下（背面）に描画
        if (photo.src && photo.complete) {
            const pw = photo.width * scale, ph = photo.height * scale;
            ctx.drawImage(photo, pos.x - pw/2, pos.y - ph/2, pw, ph);
        } else {
            ctx.fillStyle = "#111";
            ctx.fillRect(107, 141, 755, 272);
        }
        ctx.restore();

        // --- STEP 2: 背景（新聞枠）を上に重ねる ---
        ctx.drawImage(bg, 0, 0);

        // --- STEP 3: 文字描画（位置を数百単位で大幅に上に修正） ---
        ctx.fillStyle = "#2c2c2c";
        
        // タイトル: 450から大幅にアップ -> y=435
        ctx.textAlign = "center";
        ctx.font = "bold 32px serif";
        ctx.fillText(document.getElementById('ttl').value || "EVENT TITLE", cv.width/2, 435);

        // 本文: 510から大幅にアップ -> y=475
        ctx.textAlign = "left";
        ctx.font = "20px serif";
        wrapText(document.getElementById('txt').value || "Description text here...", 115, 475, 740, 26);

        // ボタン: y=888
        ctx.textAlign = "center";
        ctx.font = "bold 23px serif";
        ctx.fillText(document.getElementById('btn').value || "Option Button", cv.width/2, 888);
    }

    function wrapText(text, x, y, maxWidth, lineHeight) {
        text.split('\n').forEach(p => {
            let line = '';
            const chars = p.split('');
            for(let i=0; i<chars.length; i++) {
                let test = line + chars[i];
                if (ctx.measureText(test).width > maxWidth) {
                    ctx.fillText(line, x, y);
                    line = chars[i]; y += lineHeight;
                } else { line = test; }
            }
            ctx.fillText(line, x, y); y += lineHeight;
        });
    }

    ['ttl','txt','btn','zoom'].forEach(id => {
        document.getElementById(id).oninput = render;
    });

    cv.onmousedown = e => {
        drag = true;
        const r = cv.getBoundingClientRect(), s = cv.width/r.width;
        start = {x: (e.clientX - r.left)*s, y: (e.clientY - r.top)*s};
    };
    window.onmousemove = e => {
        if(!drag) return;
        const r = cv.getBoundingClientRect(), s = cv.width/r.width;
        const mx = (e.clientX - r.left)*s, my = (e.clientY - r.top)*s;
        pos.x += mx - start.x; pos.y += my - start.y;
        start = {x: mx, y: my}; render();
    };
    window.onmouseup = () => drag = false;

    document.getElementById('saveBtn').onclick = () => {
        const link = document.createElement('a');
        link.download = 'hoi4_news.png';
        link.href = cv.toDataURL("image/png");
        link.click();
    };
</script>
</body>
</html>
