<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HoI4 World News Generator</title>
    <style>
        :root { --gold: #d4af37; --bg: #121212; --panel: #252525; }
        body { font-family: 'Georgia', serif; background: var(--bg); color: #eee; margin: 0; display: flex; padding: 20px; gap: 30px; justify-content: center; }
        .sidebar { width: 360px; background: var(--panel); padding: 25px; border-radius: 12px; border: 1px solid #333; height: fit-content; box-shadow: 0 10px 30px #000; }
        h1 { color: var(--gold); font-size: 20px; text-align: center; margin: 0 0 20px; text-transform: uppercase; }
        .group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 12px; font-weight: bold; color: var(--gold); }
        input[type="text"], textarea, input[type="file"] { width: 100%; background: #151515; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 4px; box-sizing: border-box; }
        textarea { height: 120px; resize: none; font-family: serif; font-size: 16px; }
        .slider-box { display: flex; align-items: center; gap: 10px; margin-top: 10px; font-size: 12px; }
        input[type="range"] { flex: 1; accent-color: var(--gold); }
        button#saveBtn { width: 100%; padding: 15px; background: #45a049; color: white; border: none; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button#saveBtn:hover { background: #52be57; }
        .viewport { background: #000; padding: 10px; border-radius: 8px; position: sticky; top: 20px; box-shadow: 0 0 50px #000; }
        canvas { display: block; max-height: 90vh; max-width: 100%; cursor: move; }
        .hint { font-size: 11px; color: #777; text-align: center; margin-top: 10px; font-style: italic; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>HOI4 EVENT GEN</h1>
        <div class="group">
            <label>1. PHOTO UPLOAD</label>
            <input type="file" id="photoIn" accept="image/*">
            <div class="slider-box"><span>Zoom</span><input type="range" id="zoom" min="0.1" max="4" step="0.01" value="0.85"></div>
        </div>
        <div class="group">
            <label>2. EVENT TITLE</label>
            <input type="text" id="ttl" placeholder="The Rhineland Remilitarized">
        </div>
        <div class="group">
            <label>3. DESCRIPTION CONTENT</label>
            <textarea id="txt" placeholder="German troops have entered the Rhineland..."></textarea>
        </div>
        <div class="group">
            <label>4. OPTION LABEL</label>
            <input type="text" id="btn" placeholder="This is German territory.">
        </div>
        <button id="saveBtn">EXPORT AS PNG</button>
        <p class="hint">Drag the photo in the preview to move it.</p>
    </div>

    <div class="viewport">
        <canvas id="cv"></canvas>
    </div>

<script>
    const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
    const bg = new Image(), photo = new Image();
    let pos = {x: 485, y: 280}, scale = 0.85, drag = false, start = {x: 0, y: 0};

    // 1. 背景画像を読み込み
    bg.src = "template.png"; 

    bg.onload = () => { 
        cv.width = bg.width; 
        cv.height = bg.height; 
        render(); 
    };

    // 2. 写真のアップロード
    document.getElementById('photoIn').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (f) => { 
            photo.src = f.target.result; 
            photo.onload = render; 
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function render() {
        ctx.clearRect(0, 0, cv.width, cv.height);

        // --- STEP 1: 写真を一番下に描画 ---
        if (photo.src) {
            const pw = photo.width * scale, ph = photo.height * scale;
            ctx.drawImage(photo, pos.x - pw/2, pos.y - ph/2, pw, ph);
        } else {
            ctx.fillStyle = "#111"; // 写真がない時は黒
            ctx.fillRect(107, 141, 755, 272);
        }

        // --- STEP 2: 背景（新聞枠）を上に重ねる ---
        ctx.drawImage(bg, 0, 0);

        // --- STEP 3: 文字を描画 ---
        ctx.fillStyle = "#2c2c2c";
        
        // タイトル: 位置を上に調整
        ctx.textAlign = "center"; 
        ctx.font = "bold 32px serif";
        ctx.fillText(document.getElementById('ttl').value || "EVENT TITLE", cv.width/2, 445);

        // 説明文: 開始位置と行間を調整
        ctx.textAlign = "left"; 
        ctx.font = "20px serif";
        wrapText(document.getElementById('txt').value || "Description text here...", 115, 515, 740, 26);

        // ボタン: プレートの中央に
        ctx.textAlign = "center"; 
        ctx.font = "bold 23px serif";
        ctx.fillText(document.getElementById('btnText') ? document.getElementById('btnText').value : (document.getElementById('btn').value || "Option Button"), cv.width/2, 888);
    }

    // 自動改行関数
    function wrapText(text, x, y, maxWidth, lineHeight) {
        text.split('\n').forEach(p => {
            let line = '';
            let words = p.split(' ');
            for(let i=0; i<words.length; i++) {
                let test = line + words[i] + ' ';
                if (ctx.measureText(test).width > maxWidth && i > 0) {
                    ctx.fillText(line, x, y);
                    line = words[i] + ' ';
                    y += lineHeight;
                } else {
                    line = test;
                }
            }
            ctx.fillText(line, x, y);
            y += lineHeight;
        });
    }

    // リアルタイム反映
    ['ttl','txt','btn','zoom'].forEach(id => {
        document.getElementById(id).oninput = render;
    });

    // 写真の移動操作
    cv.onmousedown = e => {
        drag = true; 
        const r = cv.getBoundingClientRect(), s = cv.width/r.width;
        start = {x: (e.clientX - r.left)*s, y: (e.clientY - r.top)*s};
    };
    window.onmousemove = e => {
        if(!drag) return;
        const r = cv.getBoundingClientRect(), s = cv.width/r.width;
        const mx = (e.clientX - r.left)*s, my = (e.clientY - r.top)*s;
        pos.x += mx - start.x; 
        pos.y += my - start.y;
        start = {x: mx, y: my}; 
        render();
    };
    window.onmouseup = () => drag = false;

    // 画像として保存
    document.getElementById('saveBtn').onclick = () => {
        const link = document.createElement('a'); 
        link.download = 'hoi4_news_event.png';
        link.href = cv.toDataURL("image/png"); 
        link.click();
    };
</script>
</body>
</html>
