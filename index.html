<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>HoI4 News Generator - Ironclad Layout</title>
    <style>
        :root { --gold: #d4af37; --bg: #121212; --panel: #1e1e1e; }
        body { background: var(--bg); color: #eee; font-family: "Hiragino Mincho ProN", serif; display: flex; padding: 20px; gap: 30px; justify-content: center; margin: 0; }
        .sidebar { width: 360px; background: var(--panel); padding: 25px; border-radius: 12px; border: 1px solid #333; height: fit-content; box-shadow: 0 10px 30px #000; }
        h1 { color: var(--gold); font-size: 20px; text-align: center; margin: 0 0 20px; text-transform: uppercase; letter-spacing: 2px; }
        .group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 12px; font-weight: bold; color: var(--gold); }
        input[type="text"], textarea, input[type="file"] { width: 100%; background: #111; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        textarea { height: 120px; resize: none; line-height: 1.5; font-family: serif; }
        .slider-box { display: flex; align-items: center; gap: 10px; margin-top: 10px; font-size: 12px; }
        input[type="range"] { flex: 1; accent-color: var(--gold); }
        button#saveBtn { width: 100%; padding: 15px; background: #45a049; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button#saveBtn:hover { background: #52be57; }
        .viewport { background: #000; padding: 10px; border-radius: 8px; position: sticky; top: 20px; box-shadow: 0 0 50px #000; }
        canvas { display: block; max-height: 90vh; max-width: 100%; cursor: move; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>HOI4 EVENT GEN</h1>
        <div class="group">
            <label>1. PHOTO UPLOAD</label>
            <input type="file" id="photoIn" accept="image/*">
            <div class="slider-box"><span>Zoom</span><input type="range" id="zoom" min="0.1" max="4" step="0.01" value="0.85"></div>
        </div>
        <div class="group">
            <label>2. EVENT TITLE</label>
            <input type="text" id="ttl" placeholder="Title here">
        </div>
        <div class="group">
            <label>3. DESCRIPTION CONTENT</label>
            <textarea id="txt" placeholder="Description here..."></textarea>
        </div>
        <div class="group">
            <label>4. OPTION LABEL</label>
            <input type="text" id="btn" placeholder="Button text">
        </div>
        <button id="saveBtn">EXPORT AS PNG</button>
    </div>

    <div class="viewport">
        <canvas id="cv"></canvas>
    </div>

<script>
    const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
    const bg = new Image(), photo = new Image();
    let pos = {x: 485, y: 280}, photoScale = 0.85, drag = false, start = {x: 0, y: 0};

    // 1. 背景画像を読み込み
    bg.src = "template.png"; 
    bg.onload = () => { 
        cv.width = bg.width; 
        cv.height = bg.height; 
        render(); 
    };

    // 2. 写真のアップロード
    document.getElementById('photoIn').onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (f) => { 
            photo.src = f.target.result; 
            photo.onload = render; 
        };
        reader.readAsDataURL(file);
    };

    function render() {
        if (!bg.complete) return;
        
        ctx.clearRect(0, 0, cv.width, cv.height);

        // 背景全体を白で初期化 (新聞の外側を白くするため)
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, cv.width, cv.height);

        // 最新のズーム値を取得
        photoScale = parseFloat(document.getElementById('zoom').value);

        // --- STEP 1: 写真を一番下に描画 ---
        if (photo.src && photo.complete) {
            const pw = photo.width * photoScale, ph = photo.height * photoScale;
            ctx.drawImage(photo, pos.x - pw/2, pos.y - ph/2, pw, ph);
        } else {
            // 写真がない時は穴を暗くしておく
            ctx.fillStyle = "#111";
            ctx.fillRect(107, 141, 755, 272);
        }

        // --- STEP 2: 背景（新聞枠）を上に重ねる ---
        ctx.drawImage(bg, 0, 0);

        // --- STEP 3: 【解決策】新聞の外側を太い白枠で覆い隠す ---
        // 新聞の絵に被らないギリギリのラインで、はみ出た写真を消します
        ctx.fillStyle = "white";
        const offset = 12; // 新聞の端から内側への距離（太すぎず細すぎない絶妙なライン）
        ctx.fillRect(0, 0, offset, cv.height); // 左壁
        ctx.fillRect(cv.width - offset, 0, offset, cv.height); // 右壁
        ctx.fillRect(0, 0, cv.width, offset); // 上壁
        ctx.fillRect(0, cv.height - offset, cv.width, offset); // 下壁

        // --- STEP 4: 文字を描画 (確定座標) ---
        ctx.fillStyle = "#2c2c2c";
        
        // タイトル: y=280 / 21px
        ctx.textAlign = "center"; 
        ctx.font = "bold 21px serif";
        ctx.fillText(document.getElementById('ttl').value || "EVENT TITLE", cv.width/2, 280);

        // 本文: x=50, y=305 / 13px / maxWidth 440 / lineHeight 15
        ctx.textAlign = "left"; 
        ctx.font = "13px serif";
        wrapText(document.getElementById('txt').value || "Description text here...", 50, 305, 440, 15);

        // ボタン: y=535 / 19px / 白文字
        ctx.textAlign = "center"; 
        ctx.font = "bold 19px serif";
        ctx.fillStyle = "white";
        ctx.fillText(document.getElementById('btn').value || "Option Button", cv.width/2, 535);
    }

    function wrapText(text, x, y, maxWidth, lineHeight) {
        text.split('\n').forEach(paragraph => {
            let line = '';
            const characters = paragraph.split('');
            for (let n = 0; n < characters.length; n++) {
                let testLine = line + characters[n];
                if (ctx.measureText(testLine).width > maxWidth) {
                    ctx.fillText(line, x, y);
                    line = characters[n];
                    y += lineHeight;
                } else {
                    line = testLine;
                }
            }
            ctx.fillText(line, x, y);
            y += lineHeight;
        });
    }

    // 全入力同期
    ['ttl','txt','btn','zoom'].forEach(id => {
        document.getElementById(id).oninput = render;
    });

    // 写真のドラッグ操作
    cv.onmousedown = e => {
        drag = true; 
        const r = cv.getBoundingClientRect(), s = cv.width/r.width;
        start = {x: (e.clientX - r.left)*s, y: (e.clientY - r.top)*s};
    };
    window.onmousemove = e => {
        if(!drag) return;
        const r = cv.getBoundingClientRect(), s = cv.width/r.width;
        const mx = (e.clientX - r.left)*s, my = (e.clientY - r.top)*s;
        pos.x += mx - start.x; pos.y += my - start.y;
        start = {x: mx, y: my}; 
        render();
    };
    window.onmouseup = () => drag = false;

    document.getElementById('saveBtn').onclick = () => {
        const link = document.createElement('a'); 
        link.download = 'hoi4_news.png';
        link.href = cv.toDataURL("image/png"); 
        link.click();
    };
</script>
</body>
</html>
