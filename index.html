<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>HoI4 News Generator - Refined Frame</title>
    <style>
        :root { --gold: #d4af37; --bg: #121212; --panel: #1e1e1e; }
        body { background: var(--bg); color: #eee; font-family: "Hiragino Mincho ProN", serif; display: flex; padding: 20px; gap: 30px; justify-content: center; margin: 0; }
        .sidebar { width: 360px; background: var(--panel); padding: 25px; border-radius: 12px; border: 1px solid #333; height: fit-content; box-shadow: 0 10px 30px #000; }
        h1 { color: var(--gold); font-size: 20px; text-align: center; margin: 0 0 20px; text-transform: uppercase; letter-spacing: 2px; }
        .group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 12px; font-weight: bold; color: var(--gold); }
        input[type="text"], textarea, input[type="file"] { width: 100%; background: #111; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 4px; box-sizing: border-box; }
        textarea { height: 120px; resize: none; font-family: serif; font-size: 16px; }
        .slider-box { display: flex; align-items: center; gap: 10px; margin-top: 10px; font-size: 12px; }
        input[type="range"] { flex: 1; accent-color: var(--gold); }
        button#saveBtn { width: 100%; padding: 15px; background: #45a049; color: white; border: none; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button#saveBtn:hover { background: #52be57; }
        .viewport { background: #000; padding: 10px; border-radius: 8px; position: sticky; top: 20px; box-shadow: 0 0 50px #000; }
        canvas { display: block; max-height: 90vh; max-width: 100%; cursor: move; }
        .hint { font-size: 11px; color: #777; text-align: center; margin-top: 10px; font-style: italic; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>HOI4 EVENT GEN</h1>
        <div class="group">
            <label>1. PHOTO UPLOAD</label>
            <input type="file" id="photoIn" accept="image/*">
            <div class="slider-box"><span>Zoom</span><input type="range" id="zoom" min="0.1" max="4" step="0.01" value="0.85"></div>
        </div>
        <div class="group">
            <label>2. EVENT TITLE</label>
            <input type="text" id="ttl" placeholder="The Rhineland Remilitarized">
        </div>
        <div class="group">
            <label>3. DESCRIPTION CONTENT</label>
            <textarea id="txt" placeholder="German troops have entered the Rhineland..."></textarea>
        </div>
        <div class="group">
            <label>4. OPTION LABEL</label>
            <input type="text" id="btn" placeholder="This is German territory.">
        </div>
        <button id="saveBtn">EXPORT AS PNG</button>
        <p class="hint">Drag the photo in the preview to move it.</p>
    </div>

    <div class="viewport">
        <canvas id="cv"></canvas>
    </div>

<script>
    const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
    const bg = new Image(), photo = new Image();
    let pos = {x: 485, y: 280}, drag = false, start = {x: 0, y: 0};

    // 1. 背景画像を読み込み
    bg.src = "template.png"; 

    bg.onload = () => { 
        cv.width = bg.width; 
        cv.height = bg.height; 
        render(); 
    };

    // 2. 写真のアップロード
    document.getElementById('photoIn').onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (f) => { 
            photo.src = f.target.result; 
            photo.onload = render; 
        };
        reader.readAsDataURL(file);
    };

    function render() {
        if (!bg.complete) return;
        ctx.clearRect(0, 0, cv.width, cv.height);

        const scale = parseFloat(document.getElementById('zoom').value);

        // --- STEP 1: 写真を一番下に描画 ---
        if (photo.src) {
            const pw = photo.width * scale, ph = photo.height * scale;
            ctx.drawImage(photo, pos.x - pw/2, pos.y - ph/2, pw, ph);
        } else {
            ctx.fillStyle = "#111"; // 写真がない時は黒
            ctx.fillRect(107, 141, 755, 272);
        }

        // --- STEP 2: 背景（新聞枠）を上に重ねる ---
        ctx.drawImage(bg, 0, 0);

        // --- STEP 3: 【重要】新聞の外側を白で塗りつぶして隠す (太さを調整) ---
        // 新聞の四辺ギリギリの位置に白い目隠しを配置。
        // 前回の20pxだと太すぎたため、デザインを邪魔しない10pxに変更しました。
        ctx.fillStyle = "white";
        const b = 10; // 目隠し幅
        ctx.fillRect(0, 0, b, cv.height); // 左
        ctx.fillRect(cv.width - b, 0, b, cv.height); // 右
        ctx.fillRect(0, 0, cv.width, b); // 上
        ctx.fillRect(0, cv.height - b, cv.width, b); // 下

        // --- STEP 4: 文字を描画 (確定座標) ---
        ctx.fillStyle = "#2c2c2c";
        
        // タイトル: y=280
        ctx.textAlign = "center"; 
        ctx.font = "bold 21px serif";
        ctx.fillText(document.getElementById('ttl').value || "EVENT TITLE", cv.width/2, 280);
