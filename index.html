<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>HOI4 イベント生成改</title>
    <style>
        :root { --gold: #d4af37; --bg: #121212; --panel: #1e1e1e; }
        body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; background: var(--bg); color: #eee; margin: 0; display: flex; padding: 20px; gap: 30px; justify-content: center; }
        .sidebar { width: 380px; background: var(--panel); padding: 25px; border-radius: 12px; border: 1px solid #333; height: fit-content; box-shadow: 0 10px 30px #000; }
        h1 { color: var(--gold); font-size: 24px; text-align: center; margin: 0 0 20px; }
        .group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: bold; color: var(--gold); }
        input[type="text"], textarea, input[type="file"] { width: 100%; background: #111; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 4px; box-sizing: border-box; font-size: 15px; }
        textarea { height: 160px; resize: none; line-height: 1.6; }
        .slider-box { display: flex; align-items: center; gap: 10px; margin-top: 10px; font-size: 13px; }
        input[type="range"] { flex: 1; accent-color: var(--gold); }
        button#saveBtn { width: 100%; padding: 18px; background: #45a049; color: white; border: none; border-radius: 6px; font-size: 20px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button#saveBtn:hover { background: #52be57; }
        .viewport { background: #000; padding: 10px; border-radius: 8px; position: sticky; top: 20px; box-shadow: 0 0 50px #000; }
        canvas { display: block; max-height: 90vh; max-width: 100%; cursor: move; }
        .hint { font-size: 12px; color: #777; text-align: center; margin-top: 10px; font-style: italic; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>HOI4 イベント生成</h1>
        <div class="group">
            <label>1. 写真のアップロード</label>
            <input type="file" id="photoIn" accept="image/*">
            <div class="slider-box"><span>ズーム</span><input type="range" id="zoom" min="0.1" max="4" step="0.01" value="0.85"></div>
        </div>
        <div class="group">
            <label>2. イベントタイトル</label>
            <input type="text" id="ttl" placeholder="ラインラント進駐">
        </div>
        <div class="group">
            <label>3. 説明内容</label>
            <textarea id="txt" placeholder="ドイツはフランス国境近くのラインラントに軍を進駐させた…。"></textarea>
        </div>
        <div class="group">
            <label>4. オプションラベル</label>
            <input type="text" id="btn" placeholder="ここはドイツの領土だ">
        </div>
        <button id="saveBtn">PNG形式で保存</button>
        <p class="hint">プレビュー画面で写真をドラッグして移動してください。</p>
    </div>

    <div class="viewport">
        <canvas id="cv"></canvas>
    </div>

<script>
    const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
    const bg = new Image(), photo = new Image();
    
    // 写真の状態管理用
    let pos = {x: 485, y: 280};
    let currentScale = 0.85;
    let drag = false, start = {x: 0, y: 0};

    // 1. テンプレート画像を読み込み
    bg.src = "template.png"; 
    bg.onload = () => { 
        cv.width = bg.width; 
        cv.height = bg.height; 
        render(); 
    };

    // 2. 写真の読み込み処理
    document.getElementById('photoIn').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (f) => { 
            photo.src = f.target.result; 
            photo.onload = () => {
                // 読み込み時に中央へ配置
                pos = {x: 485, y: 280};
                render();
            };
        };
        reader.readAsDataURL(file);
    };

    // 描画メイン関数
    function render() {
        ctx.clearRect(0, 0, cv.width, cv.height);

        // スライダーから最新の拡大率を取得
        currentScale = parseFloat(document.getElementById('zoom').value);

        // --- STEP 1: 写真を一番下に描画（切り抜かずに描画） ---
        if (photo.src && photo.complete) {
            const pw = photo.width * currentScale, ph = photo.height * currentScale;
            ctx.drawImage(photo, pos.x - pw/2, pos.y - ph/2, pw, ph);
        } else {
            // 写真がない時は枠内を暗く
            ctx.fillStyle = "#111";
            ctx.fillRect(107, 141, 755, 272);
        }

        // --- STEP 2: 背景（template.png）を上に重ねる ---
        if (bg.complete) {
            ctx.drawImage(bg, 0, 0);
        }

        // --- STEP 3: 文字を描画（位置をさらに上に修正） ---
        ctx.fillStyle = "#2c2c2c";
        
        // タイトル: y=455付近（実機の位置に準拠）
        ctx.textAlign = "center"; 
        ctx.font = "bold 32px serif";
        ctx.fillText(document.getElementById('ttl').value || "EVENT TITLE", cv.width / 2, 455);

        // 説明文: y=500付近から開始
        ctx.textAlign = "left"; 
        ctx.font = "20px serif";
        wrapText(document.getElementById('txt').value || "Description text here...", 115, 500, 740, 26);

        // ボタン: プレート中央 y=885
        ctx.textAlign = "center"; 
        ctx.font = "bold 23px serif";
        ctx.fillText(document.getElementById('btn').value || "Option Button", cv.width / 2, 885);
    }

    // 文字の自動改行（日本語対応）
    function wrapText(text, x, y, maxWidth, lineHeight) {
        const paragraphs = text.split('\n');
        paragraphs.forEach(p => {
            let line = '';
            const chars = p.split('');
            for(let i=0; i<chars.length; i++) {
                let test = line + chars[i];
                if (ctx.measureText(test).width > maxWidth) {
                    ctx.fillText(line, x, y);
                    line = chars[i];
                    y += lineHeight;
                } else {
                    line = test;
                }
            }
            ctx.fillText(line, x, y);
            y += lineHeight;
        });
    }

    // 入力項目変更時に即座に再描画
    ['ttl','txt','btn','zoom'].forEach(id => {
        document.getElementById(id).oninput = render;
    });

    // マウスドラッグ移動
    cv.onmousedown = e => {
        drag = true; 
        const r = cv.getBoundingClientRect(), s = cv.width/r.width;
        start = {x: (e.clientX - r.left)*s, y: (e.clientY - r.top)*s};
    };
    window.onmousemove = e => {
        if(!drag) return;
        const r = cv.getBoundingClientRect(), s = cv.width/r.width;
        const mx = (e.clientX - r.left)*s, my = (e.clientY - r.top)*s;
        pos.x += mx - start.x; 
        pos.y += my - start.y;
        start = {x: mx, y: my}; 
        render();
    };
    window.onmouseup = () => drag = false;

    // 画像保存
    document.getElementById('saveBtn').onclick = () => {
        const link = document.createElement('a'); 
        link.download = 'hoi4_news.png';
        link.href = cv.toDataURL("image/png"); 
        link.click();
    };
</script>
</body>
</html>
